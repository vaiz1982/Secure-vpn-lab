services:
  vpn:
    image: ${DOCKERHUB_IMAGE:-vaiz82/amneziawg-docker}:${DOCKERHUB_TAG:-latest}
    container_name: amneziawg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
    volumes:
      - vpn-config:/etc/amnezia/amneziawg
    environment:
      WG_PORT: 51820
      WG_ADDRESS: 10.13.13.1/24
      WG_JC: 4
      WG_JMIN: 40
      WG_JMAX: 70

  honeypot:
    image: cowrie/cowrie:latest
    container_name: cowrie-honeypot
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "22:2222"
    volumes:
      - ./honeypot/etc/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - ./honeypot/etc/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./honeypot/honeyfs:/cowrie/cowrie-git/honeyfs:ro
      - honeypot-logs:/cowrie/cowrie-git/log

  monitoring:
    image: jasonrivers/nagios:latest
    container_name: nagios
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./monitoring/conf.d:/opt/nagios/conf.d:ro
      - nagios-var:/opt/nagios/var
    depends_on:
      - vpn
      - honeypot

volumes:
  vpn-config:
  honeypot-logs:
  nagios-var:
