[honeypot]
hostname = prod-web-01
log_path = /cowrie/cowrie-git/log
download_path = /cowrie/cowrie-git/dl
share_path = /cowrie/cowrie-git/share/cowrie
state_path = /cowrie/cowrie-git/var/lib/cowrie
etc_path = /cowrie/cowrie-git/etc
userdb_file = /cowrie/cowrie-git/etc/userdb.txt
contents_path = /cowrie/cowrie-git/honeyfs

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_7.9p1 Debian-10

[telnet]
enabled = false

[output_jsonlog]
enabled = true
logfile = /cowrie/cowrie-git/log/cowrie.json
