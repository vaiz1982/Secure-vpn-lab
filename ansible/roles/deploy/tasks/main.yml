---
- name: Установить зависимости для Docker-репозитория
  ansible.builtin.apt:
    name: ["ca-certificates", "curl", "gnupg"]
    state: present
    update_cache: true

- name: Добавить GPG-ключ Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Добавить репозиторий Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ docker_apt_codename }} stable
    state: present

- name: Установить Docker Engine + Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Убедиться, что Docker запущен
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Создать директорию деплоя
  ansible.builtin.file:
    path: "{{ deploy_repo_path }}"
    state: directory
    mode: "0750"

- name: Скопировать docker-compose.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker-compose.yml"
    dest: "{{ deploy_repo_path }}/docker-compose.yml"
    mode: "0640"

- name: Скопировать конфиги honeypot
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../honeypot/"
    dest: "{{ deploy_repo_path }}/honeypot/"
    mode: "0640"

- name: Создать директорию monitoring/conf.d
  ansible.builtin.file:
    path: "{{ deploy_repo_path }}/monitoring/conf.d"
    state: directory
    mode: "0750"

- name: Отрендерить hosts.cfg для Nagios
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../monitoring/conf.d/hosts.cfg"
    dest: "{{ deploy_repo_path }}/monitoring/conf.d/hosts.cfg"
    mode: "0640"

- name: Отрендерить services.cfg — ssh_port берётся из hardening-роли (единый источник правды)
  ansible.builtin.template:
    src: services.cfg.j2
    dest: "{{ deploy_repo_path }}/monitoring/conf.d/services.cfg"
    mode: "0640"

- name: Сгенерировать .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ deploy_repo_path }}/.env"
    mode: "0600"

- name: Логин в Docker Hub (если образ приватный)
  community.docker.docker_login:
    username: "{{ dockerhub_username | default(omit) }}"
    password: "{{ dockerhub_password | default(omit) }}"
  when: dockerhub_username is defined

- name: Пересобрать honeyfs (fake-fs → honeyfs) до старта контейнеров
  ansible.builtin.command:
    cmd: bash build-fakefs.sh
    chdir: "{{ deploy_repo_path }}/honeypot"
  changed_when: true

- name: docker compose up -d
  ansible.builtin.command:
    cmd: docker compose up -d --pull always
    chdir: "{{ deploy_repo_path }}"
  changed_when: true

- name: Проверить, что VPN-порт слушает
  ansible.builtin.wait_for:
    port: "{{ vpn_port }}"
    proto: udp
    timeout: 30
    state: started
  ignore_errors: true # wait_for не всегда умеет честно проверять UDP — не фейлим плейбук на этом
