---
- name: Установить fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Настроить SSH — порт, root login, password auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: '/usr/sbin/sshd -t -f %s'
  loop:
    - { regexp: '^#?Port ', line: "Port {{ ssh_port }}" }
    - { regexp: '^#?PermitRootLogin ', line: "PermitRootLogin {{ ssh_permit_root_login }}" }
    - { regexp: '^#?PasswordAuthentication ', line: "PasswordAuthentication {{ ssh_password_authentication }}" }
  notify: restart sshd

- name: Разрешить новый SSH-порт в UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
  when: ansible_facts.services['ufw.service'] is defined or ufw_enabled | default(false)

- name: Закрыть старый 22-й порт для обычного SSH
  community.general.ufw:
    rule: deny
    port: "22"
    proto: tcp
  when: ufw_enabled | default(false)

- name: Развернуть jail.local для fail2ban
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Убедиться, что fail2ban включён и запущен
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
